<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Puzzle Assistant</title>
    <style>
      body {
        width: 220px;
        padding: 10px;
        font-family: sans-serif;
      }
      button {
        width: 100%;
        padding: 10px;
        margin-bottom: 5px;
        cursor: pointer;
        background: #0a66c2;
        color: white;
        border: none;
        border-radius: 4px;
      }
      button:hover {
        background: #004182;
      }
      #output {
        margin-top: 10px;
        font-size: 12px;
        word-wrap: break-word;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <h3>Puzzle Assistant</h3>
    <div id="game-detector">Detecting game...</div>

    <!-- Sudoku Interface -->
    <div id="sudoku-section" class="hidden">
      <button id="run-sudoku-solver">Solve Sudoku</button>
    </div>

    <!-- Queens Interface -->
    <div id="queens-section" class="hidden">
      <button id="run-queens-solver">Solve Queens</button>
    </div>

    <div id="output"></div>

    <script src="sudoku_solver.js"></script>
    <script src="queens_solver.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
