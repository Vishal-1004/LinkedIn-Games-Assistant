<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sudoku & Queens Assistant</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --text: #1f2937;
        --accent: #0a66c2;
        --accent-2: #2563eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 280px;
        margin: 0;
        padding: 14px;
        font-family: Inter, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #f8fbff 0%, var(--bg) 100%);
        color: var(--text);
      }

      .title {
        margin: 0 0 8px;
        font-size: 16px;
        font-weight: 700;
        color: var(--accent);
      }

      .status {
        margin-bottom: 10px;
        padding: 8px 10px;
        border-radius: 10px;
        font-size: 12px;
        font-weight: 600;
        background: #f3f4f6;
        color: var(--text);
      }

      .section {
        margin-top: 6px;
      }

      button {
        width: 100%;
        padding: 10px 12px;
        cursor: pointer;
        border: none;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 600;
        color: white;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      }

      #output {
        display: none;
        margin-top: 8px;
        padding: 10px;
        border-radius: 10px;
        font-size: 12px;
        line-height: 1.4;
        word-wrap: break-word;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
      }

      #output.show {
        display: block;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <h3 class="title">Sudoku & Queens Assistant</h3>
    <div id="game-detector" class="status">Detecting game...</div>

    <div id="sudoku-section" class="section hidden">
      <button id="run-sudoku-solver">Solve Sudoku</button>
    </div>

    <div id="queens-section" class="section hidden">
      <button id="run-queens-solver">Solve Queens</button>
    </div>

    <div id="tango-section" class="section hidden">
      <button id="run-tango-data">Read Tango Board</button>
    </div>

    <div id="output"></div>

    <script src="sudoku_solver.js"></script>
    <script src="queens_solver.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
